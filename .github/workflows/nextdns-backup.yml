name: Backup NextDNS Configuration

on:
  schedule:
    - cron: '0 0 * * 0' # Runs automatically every Sunday at midnight
  workflow_dispatch:     # Allows you to trigger it manually with a button click

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # Allows the automation to save the file back to your repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Profile Settings from NextDNS
        env:
          API_KEY: ${{ secrets.NEXTDNS_API_KEY }}
          PROFILE_ID: ${{ secrets.NEXTDNS_PROFILE_ID }}
        run: |
          mkdir -p nextdns-backups
          curl -s -X GET "https://api.nextdns.io/profiles/$PROFILE_ID" \
               -H "X-Api-Key: $API_KEY" > nextdns-backups/settings.json

      - name: Commit and Push backup file
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add nextdns-backups/settings.json
          if git diff --staged --quiet; then
            echo "No changes detected in NextDNS settings since last backup."
          else
            git commit -m "Automated NextDNS configuration backup [skip ci]"
            git push
          fi
